# Nacos 配置: payment-service.yaml
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/db_payment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 2096035290
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

# 支付配置
payment:
  mock:
    success-rate: 1.0

# 支付宝沙箱配置
alipay:
  app-id: ""
  # 应用私钥（PKCS8 格式，用于签名请求）
  private-key: "“
  # 支付宝公钥（在沙箱控制台上传应用公钥后由支付宝生成，用于验证回调签名）
  alipay-public-key: ""
  # 应用公钥（上传到支付宝沙箱的原始公钥，用于本地密钥对验证）
  app-public-key: ""
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # FRP 内网穿透公网地址（支付宝异步通知用）
  notify-url:
  # 同步跳转地址（用户支付完成后浏览器跳回）
  return-url:
  charset: UTF-8
  format: json
  sign-type: RSA2

# 沙箱买家账号（用于在支付宝支付页面登录的测试账号）
sandbox:
  buyer:
    # 请到支付宝沙箱控制台 -> 沙箱账号 获取以下信息
    account: ""
    login-password: "111111"
    payment-password: "111111"
