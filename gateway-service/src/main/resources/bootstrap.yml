server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ${NACOS_NAMESPACE:public}
      config:
        server-addr: 127.0.0.1:8848
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
        shared-configs:
          - data-id: common-config.yaml
            group: DEFAULT_GROUP
            refresh: true
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
      eager: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  config:
    import:
      - optional:nacos:gateway-service.yaml
