openapi: 3.0.3
info:
  title: Order Service API
  description: 订单服务 - 创建订单、取消订单、订单列表(买家/卖家视角)
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8080/api
    description: Gateway

paths:
  /order:
    post:
      tags: [Order]
      summary: 创建订单
      security: [BearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderReq' }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OrderVO' }

  /order/my:
    get:
      tags: [Order]
      summary: 买家订单列表
      security: [BearerAuth: []]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [PENDING_PAYMENT, PENDING_SHIP, SHIPPED, COMPLETED, CANCELLED] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200': { description: OK }

  /order/shop:
    get:
      tags: [Order]
      summary: 卖家/店铺订单列表
      security: [BearerAuth: []]
      parameters:
        - { name: shop_id, in: query, required: true, schema: { type: integer, format: int64 } }
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200': { description: OK }

  /order/{id}:
    get:
      tags: [Order]
      summary: 订单详情
      security: [BearerAuth: []]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OrderDetailVO' }

  /order/{id}/cancel:
    put:
      tags: [Order]
      summary: 取消订单
      security: [BearerAuth: []]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200': { description: 取消成功 }

  # ---- 内部接口 ----
  /order/internal/{id}:
    get:
      tags: [Order-Internal]
      summary: 获取订单信息(内部Feign调用)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK }

  /order/internal/{id}/status:
    put:
      tags: [Order-Internal]
      summary: 更新订单状态(内部Feign调用,支付回调使用)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
      responses:
        '200': { description: OK }

components:
  schemas:
    Result:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: {}

    CreateOrderReq:
      type: object
      required: [items, address_id]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku_id, quantity]
            properties:
              sku_id:   { type: integer, format: int64 }
              quantity: { type: integer, minimum: 1 }
        address_id: { type: integer, format: int64 }
        remark:     { type: string }

    OrderVO:
      type: object
      properties:
        id:             { type: integer, format: int64 }
        order_no:       { type: string }
        user_id:        { type: integer, format: int64 }
        shop_id:        { type: integer, format: int64 }
        total_amount:   { type: number }
        pay_amount:     { type: number }
        status:         { type: string }
        cancel_reason:  { type: string }
        create_time:    { type: string, format: date-time }

    OrderDetailVO:
      allOf:
        - $ref: '#/components/schemas/OrderVO'
        - type: object
          properties:
            address_snapshot: { type: object }
            items:
              type: array
              items: { $ref: '#/components/schemas/OrderItemVO' }

    OrderItemVO:
      type: object
      properties:
        id:           { type: integer, format: int64 }
        sku_id:       { type: integer, format: int64 }
        sku_snapshot: { type: object }
        quantity:     { type: integer }
        unit_price:   { type: number }
