openapi: 3.0.3
info:
  title: User Service API
  description: 用户服务 - 注册、登录、个人信息、收货地址管理
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8080/api
    description: Gateway

paths:
  /user/register:
    post:
      tags: [User]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, minLength: 3, maxLength: 64 }
                password: { type: string, minLength: 6 }
                email:    { type: string, format: email }
                phone:    { type: string }
                role:     { type: string, enum: [BUYER, SELLER], default: BUYER }
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /user/login:
    post:
      tags: [User]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: 登录成功，返回 JWT token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:    { type: string }
                          userInfo: { $ref: '#/components/schemas/UserVO' }

  /user/profile:
    get:
      tags: [User]
      summary: 获取当前用户信息
      security: [BearerAuth: []]
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserVO' }
    put:
      tags: [User]
      summary: 更新个人信息
      security: [BearerAuth: []]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string }
                phone:    { type: string }
                avatar:   { type: string }
      responses:
        '200': { description: 更新成功 }

  /user/address:
    get:
      tags: [Address]
      summary: 获取地址列表
      security: [BearerAuth: []]
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AddressVO' }
    post:
      tags: [Address]
      summary: 新增地址
      security: [BearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressSaveReq' }
      responses:
        '200': { description: 新增成功 }

  /user/address/{id}:
    put:
      tags: [Address]
      summary: 修改地址
      security: [BearerAuth: []]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressSaveReq' }
      responses:
        '200': { description: 修改成功 }
    delete:
      tags: [Address]
      summary: 删除地址
      security: [BearerAuth: []]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: 删除成功 }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Result:
      type: object
      properties:
        code:    { type: integer }
        message: { type: string }
        data:    { type: object }

    UserVO:
      type: object
      properties:
        id:       { type: integer, format: int64 }
        username: { type: string }
        email:    { type: string }
        phone:    { type: string }
        avatar:   { type: string }
        role:     { type: string }
        status:   { type: integer }

    AddressVO:
      type: object
      properties:
        id:             { type: integer, format: int64 }
        user_id:        { type: integer, format: int64 }
        receiver_name:  { type: string }
        receiver_phone: { type: string }
        province:       { type: string }
        city:           { type: string }
        district:       { type: string }
        detail:         { type: string }
        is_default:     { type: integer }

    AddressSaveReq:
      type: object
      required: [receiver_name, receiver_phone, province, city, district, detail]
      properties:
        receiver_name:  { type: string }
        receiver_phone: { type: string }
        province:       { type: string }
        city:           { type: string }
        district:       { type: string }
        detail:         { type: string }
        is_default:     { type: integer }
